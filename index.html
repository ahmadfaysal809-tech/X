<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="My Twitter">
    <meta name="description" content="Your personal Twitter clone - fast, free, and installable">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiTXkgVHdpdHRlciIsInNob3J0X25hbWUiOiJUd2l0dGVyIiwic3RhcnRfdXJsIjoiLiIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiMwMDAwMDAiLCJ0aGVtZV9jb2xvciI6IiMwMDAwMDAiLCJpY29ucyI6W3sic3JjIjoiaHR0cHM6Ly92aWEucGxhY2Vob2xkZXIuY29tLzE5Mi8xREFGMUYyL2ZmZmZmZj90ZXh0PVgiLCJzaXplcyI6IjE5MngxOTIiLCJ0eXBlIjoiaW1hZ2UvcG5nIn1dfQ==">
    
    <title>My Twitter</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000; 
            color: #fff; 
            height: 100vh; 
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: none;
        }
        
        .app { 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .header { 
            height: 53px; 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0 16px; 
            display: flex; 
            align-items: center; 
            border-bottom: 1px solid #2f3336; 
            position: sticky; 
            top: 0; 
            z-index: 10;
        }
        
        .logo { font-size: 24px; font-weight: bold; margin-left: auto; margin-right: auto; }
        
        .tabs { 
            height: 50px; 
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex; 
            border-bottom: 1px solid #2f3336;
            position: sticky;
            top: 53px;
            z-index: 9;
        }
        
        .tab { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 13px; 
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        
        .tab.active { 
            color: #fff; 
            font-weight: 700;
        }
        
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 25%;
            right: 25%;
            height: 3px;
            background: #1DA1F2;
            border-radius: 3px 3px 0 0;
        }
        
        .feed { 
            flex: 1; 
            overflow-y: auto; 
            padding: 0;
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
            -webkit-overflow-scrolling: touch;
        }
        
        .tweet { 
            display: flex; 
            padding: 12px 16px; 
            border-bottom: 1px solid #2f3336; 
            cursor: pointer; 
            transition: background 0.2s;
        }
        
        .tweet:active { background: rgba(29,161,242,0.1); }
        
        .avatar { 
            width: 48px; 
            height: 48px; 
            border-radius: 50%; 
            margin-right: 12px; 
            background: linear-gradient(45deg, #1DA1F2, #17BF63);
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
        }
        
        .content { flex: 1; min-width: 0; }
        
        .header-row { 
            display: flex; 
            align-items: center; 
            margin-bottom: 4px; 
            flex-wrap: wrap;
            gap: 4px;
        }
        
        .name { font-weight: 700; font-size: 15px; color: #fff; }
        .handle, .time { color: #71767b; font-size: 15px; }
        
        .text { 
            font-size: 15px; 
            line-height: 1.4; 
            margin-bottom: 12px; 
            word-break: break-word;
            color: #e7e9ea;
        }
        
        .media { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 16px; 
            margin-bottom: 12px;
            display: block;
        }
        
        .actions { 
            display: flex; 
            justify-content: space-between; 
            max-width: 425px;
            margin-top: 4px;
        }
        
        .action { 
            display: flex; 
            align-items: center; 
            padding: 8px; 
            border-radius: 50%; 
            color: #71767b; 
            font-size: 13px; 
            transition: all 0.2s; 
            cursor: pointer;
            gap: 6px;
        }
        
        .action:active { transform: scale(0.9); }
        
        .action.liked { color: #f91880; }
        .action.retweeted { color: #00ba7c; }
        
        .fab { 
            position: fixed; 
            right: 20px; 
            bottom: calc(25px + env(safe-area-inset-bottom)); 
            width: 56px; 
            height: 56px; 
            border-radius: 50%; 
            background: #1DA1F2; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(29,161,242,0.4);
            cursor: pointer;
            z-index: 100;
            transition: transform 0.2s;
        }
        
        .fab:active { transform: scale(0.9); }
        
        .loading { 
            text-align: center; 
            padding: 40px; 
            color: #71767b;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #2f3336;
            border-top-color: #1DA1F2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Install Prompt */
        .install-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #1DA1F2;
            color: white;
            padding: 12px 16px;
            display: none;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }
        
        .install-banner.show { display: flex; }
        
        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }
        
        .install-btn {
            background: white;
            color: #1DA1F2;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
        }
        
        /* Pull to refresh indicator */
        .ptr-indicator {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #71767b;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .ptr-indicator.show { opacity: 1; }
        
        /* iOS specific fixes */
        @supports (-webkit-touch-callout: none) {
            .feed { padding-top: 0; }
        }
    </style>
</head>
<body>
    <!-- Install Banner -->
    <div class="install-banner" id="installBanner">
        <span>📱 হোম স্ক্রিনে ইনস্টল করুন</span>
        <button class="install-btn" onclick="installApp()">ইনস্টল</button>
    </div>

    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const tweetsData = [
            { id: 1, user: "Elon Musk", handle: "@elonmusk", text: "🚀 Twitter is now X! Free speech forever. #Freedom", likes: 125432, retweets: 45432, replies: 2345, image: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=400&h=250&fit=crop", liked: false },
            { id: 2, user: "Cristiano Ronaldo", handle: "@Cristiano", text: "Siuuuu! Never give up! 💪⚽ #MUFC #CR7", likes: 256789, retweets: 67890, replies: 4567, image: "https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=400&h=250&fit=crop", liked: false },
            { id: 3, user: "NASA", handle: "@NASA", text: "James Webb Space Telescope captures most distant galaxy ever! 🌌 #JWST", likes: 89234, retweets: 34567, replies: 2345, image: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=400&h=250&fit=crop", liked: false },
            { id: 4, user: "Barack Obama", handle: "@BarackObama", text: "Yes we can! Change starts with hope. 🇺🇸", likes: 76543, retweets: 28901, replies: 1987, liked: false },
            { id: 5, user: "Your Twitter", handle: "@MyTwitterClone", text: "Welcome to YOUR Twitter! No bans, full control! 🔥 Share your thoughts freely. #FreeSpeech", likes: 1234, retweets: 567, replies: 89, image: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=250&fit=crop", liked: false },
            { id: 6, user: "Bill Gates", handle: "@BillGates", text: "Investing in clean energy is investing in our future. 🌍💡", likes: 54321, retweets: 23456, replies: 1678, liked: false },
        ];

        // Format numbers for display
        const formatNumber = (num) => {
            if (num >= 1000000) return (num/1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num/1000).toFixed(1) + 'K';
            return num.toString();
        };

        const App = () => {
            const [tweets, setTweets] = useState([]);
            const [activeTab, setActiveTab] = useState('Home');
            const [loading, setLoading] = useState(true);
            const [refreshing, setRefreshing] = useState(false);
            const feedRef = useRef(null);
            const touchStartY = useRef(0);

            // Initial load
            useEffect(() => {
                setTimeout(() => {
                    setTweets(tweetsData);
                    setLoading(false);
                }, 800);
            }, []);

            // Pull to refresh handler
            useEffect(() => {
                const feed = feedRef.current;
                if (!feed) return;

                const handleTouchStart = (e) => {
                    touchStartY.current = e.touches[0].clientY;
                };

                const handleTouchMove = (e) => {
                    const touchY = e.touches[0].clientY;
                    const scrollTop = feed.scrollTop;
                    const pullDistance = touchY - touchStartY.current;
                    
                    if (scrollTop === 0 && pullDistance > 60) {
                        setRefreshing(true);
                    }
                };

                const handleTouchEnd = () => {
                    if (refreshing) {
                        setTimeout(() => {
                            const newTweet = {
                                id: Date.now(),
                                user: "Fresh Update",
                                handle: `@fresh${Math.floor(Math.random()*1000)}`,
                                text: `🆕 নতুন টুইট! ${new Date().toLocaleTimeString('bn-BD')}`,
                                likes: Math.floor(Math.random() * 1000),
                                retweets: Math.floor(Math.random() * 500),
                                replies: Math.floor(Math.random() * 100),
                                liked: false
                            };
                            setTweets(prev => [newTweet, ...prev]);
                            setRefreshing(false);
                        }, 1000);
                    }
                };

                feed.addEventListener('touchstart', handleTouchStart, {passive: true});
                feed.addEventListener('touchmove', handleTouchMove, {passive: true});
                feed.addEventListener('touchend', handleTouchEnd);

                return () => {
                    feed.removeEventListener('touchstart', handleTouchStart);
                    feed.removeEventListener('touchmove', handleTouchMove);
                    feed.removeEventListener('touchend', handleTouchEnd);
                };
            }, [refreshing]);

            // Like functionality
            const likeTweet = useCallback((id) => {
                setTweets(prev => prev.map(tweet => {
                    if (tweet.id === id) {
                        const newLiked = !tweet.liked;
                        return { 
                            ...tweet, 
                            liked: newLiked,
                            likes: newLiked ? tweet.likes + 1 : tweet.likes - 1
                        };
                    }
                    return tweet;
                }));
            }, []);

            // Post tweet
            const postTweet = () => {
                const tweetText = prompt("আপনার টুইট লিখুন:");
                if (tweetText && tweetText.trim()) {
                    const newTweet = {
                        id: Date.now(),
                        user: "আপনি",
                        handle: "@আপনারহ্যান্ডেল",
                        text: tweetText,
                        likes: 0,
                        retweets: 0,
                        replies: 0,
                        liked: false
                    };
                    setTweets(prev => [newTweet, ...prev]);
                    
                    // Haptic feedback if available
                    if (navigator.vibrate) navigator.vibrate(50);
                }
            };

            if (loading) {
                return (
                    <div className="app">
                        <div className="header">
                            <div className="logo">𝕏</div>
                        </div>
                        <div className="loading">
                            <div className="spinner"></div>
                            <div>লোড হচ্ছে...</div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="app">
                    <div className="header">
                        <div className="logo">𝕏</div>
                    </div>
                    
                    <div className="tabs">
                        <div className={`tab ${activeTab === 'Home' ? 'active' : ''}`} onClick={() => setActiveTab('Home')}>🏠 হোম</div>
                        <div className={`tab ${activeTab === 'Search' ? 'active' : ''}`} onClick={() => setActiveTab('Search')}>🔍 খুঁজুন</div>
                        <div className={`tab ${activeTab === 'Notifications' ? 'active' : ''}`} onClick={() => setActiveTab('Notifications')}>🔔 নোটিফ</div>
                        <div className={`tab ${activeTab === 'Messages' ? 'active' : ''}`} onClick={() => setActiveTab('Messages')}>💬 মেসেজ</div>
                    </div>

                    <div className="feed" ref={feedRef}>
                        <div className={`ptr-indicator ${refreshing ? 'show' : ''}`}>
                            {refreshing ? '🔄 রিফ্রেশ হচ্ছে...' : '↓ টানুন রিফ্রেশ করতে'}
                        </div>
                        
                        {tweets.map(tweet => (
                            <div key={tweet.id} className="tweet" onClick={() => {
                                if (navigator.vibrate) navigator.vibrate(10);
                            }}>
                                <div className="avatar" style={{
                                    backgroundImage: `url(${tweet.image || 'https://via.placeholder.com/48/1DA1F2/ffffff?text=' + tweet.user.charAt(0)})`
                                }}></div>
                                <div className="content">
                                    <div className="header-row">
                                        <span className="name">{tweet.user}</span>
                                        <span className="handle">{tweet.handle}</span>
                                        <span className="time">· {Math.floor(Math.random()*24)}h</span>
                                    </div>
                                    <div className="text">{tweet.text}</div>
                                    {tweet.image && <img src={tweet.image} className="media" alt="" loading="lazy" />}
                                    <div className="actions">
                                        <div className="action" onClick={e => {
                                            e.stopPropagation();
                                            alert('রিপ্লাই করুন: ' + tweet.user);
                                        }}>💬 {formatNumber(tweet.replies)}</div>
                                        <div className={`action ${tweet.retweeted ? 'retweeted' : ''}`} onClick={e => {
                                            e.stopPropagation();
                                            setTweets(prev => prev.map(t => t.id === tweet.id ? {...t, retweeted: !t.retweeted, retweets: t.retweeted ? t.retweets-1 : t.retweets+1} : t));
                                        }}>🔄 {formatNumber(tweet.retweets)}</div>
                                        <div className={`action ${tweet.liked ? 'liked' : ''}`} onClick={e => {
                                            e.stopPropagation();
                                            likeTweet(tweet.id);
                                            if (navigator.vibrate) navigator.vibrate(20);
                                        }}>{tweet.liked ? '❤️' : '🤍'} {formatNumber(tweet.likes)}</div>
                                        <div className="action" onClick={e => {
                                            e.stopPropagation();
                                            if (navigator.share) {
                                                navigator.share({
                                                    title: tweet.user,
                                                    text: tweet.text
                                                });
                                            } else {
                                                alert('শেয়ার করুন');
                                            }
                                        }}>📤</div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="fab" onClick={postTweet}>✍️</div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <script>
        // PWA Installation Logic
        let deferredPrompt;
        const installBanner = document.getElementById('installBanner');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.classList.add('show');
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install prompt');
                        installBanner.classList.remove('show');
                    }
                    deferredPrompt = null;
                });
            } else {
                // iOS Safari instructions
                alert('iOS: Safari শেয়ার বাটনে ট্যাপ করুন → "Add to Home Screen" বেছে নিন\n\nAndroid: Chrome মেনু → "Add to Home screen"');
            }
        }

        // Hide banner if already installed
        window.addEventListener('appinstalled', () => {
            installBanner.classList.remove('show');
            deferredPrompt = null;
        });

        // Register Service Worker for offline support
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response('Offline'))));
            `;
            
            const blob = new Blob([swCode], {type: 'application/javascript'});
            const swUrl = URL.createObjectURL(blob);
            
            navigator.serviceWorker.register(swUrl).catch(err => console.log('SW registration failed'));
        }

        // Prevent double-tap zoom on iOS
        document.addEventListener('dblclick', function(event) {
            event.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
